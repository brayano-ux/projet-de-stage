    <script>
       const placeholder = document.getElementById('placeholder-logo');
const image = document.getElementById('fichier-logo');
const appercu = document.getElementById('apercu-logo');

document.getElementById('fichier-logo').addEventListener('change', function(e) {
    e.preventDefault();
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
        const reader = new FileReader(); // ✅ parenthèses ajoutées
        reader.onload = function(e) {
            appercu.src = e.target.result;
            appercu.classList.remove('hidden');
            placeholder.classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }
});
        document.getElementById('formulaire-boutique').addEventListener('submit', function(e) {
    e.preventDefault();
    const boutton= document.getElementById('bouton-soumettre');
    const textoriginal= boutton.innerHTML;
    boutton.disabled=true;
    boutton.innerHTML= '<i class="fas fa-spinner fa-spin"></i>  Création en cours...';
    document.querySelector('#zone-messages').innerHTML = '';
    fetch('boutique.php',{
        method:'POST',
        body:new FormData(this),
    })
    .then(reponse=>reponse.json())
    .then(reponse=>{
        console.log(reponse);
        const zonemessage=document.querySelector('#zone-messages');
        if(reponse.success){
            zonemessage.innerHTML=` <div class="message-succes">
                    <strong>✅ ${response.message}</strong>
                    <p>Redirection vers votre tableau de bord...</p>
                </div>
`;
setTimeout(()=>{
    window.location.href='ajout_produits.html';
},2000);
        }else {
            let erreurHtml = '<div class="message-erreur">';
            erreurHtml += '<strong>❌ Erreur</strong><br>';

            if (response.message) {
                erreurHtml += response.message;
            }

            if (response.errors && response.errors.length > 0) {
                erreurHtml += '<ul style="margin-top: 10px; margin-left: 20px;">';
                response.errors.forEach(error => {
                    erreurHtml += `<li>${error}</li>`;
                });
                erreurHtml += '</ul>';
            }

      erreurHtml += '</div>';
            zoneMessages.innerHTML = erreurHtml;

            bouton.disabled = false;
            bouton.innerHTML = texteOriginal;

            window.scrollTo({
                top: zoneMessages.offsetTop - 100,
                behavior: 'smooth'
            });
        }
    })
    .catch(error => {
        console.error('Erreur AJAX:', error);

        const zoneMessages = document.getElementById('zone-messages');
        zoneMessages.innerHTML = `
            <div class="message-erreur">
                <strong>❌ Erreur de communication</strong>
                <p>Impossible de contacter le serveur.</p>
            </div>
        `;

        bouton.disabled = false;
        bouton.innerHTML = texteOriginal;
    });

    })
    </script>
