<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Produit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/formulaire_article.css">
</head>
<body>

<div class="page">

    <!-- En-tête -->
    <div class="entete">
        <div class="entete-inner">
            <div class="entete-icone"><i class="fas fa-plus"></i></div>
            <div class="entete-texte">
                <h1>Ajoutez vos articles</h1>
                <p>Rejoignez notre <a href="#" target="_blank"><i class="fab fa-whatsapp"></i> groupe WhatsApp</a> pour augmenter vos ventes</p>
            </div>
            <div class="entete-badge">LocalShop</div>
        </div>
    </div>

    <!-- Formulaire -->
    <div class="carte">
        <form id="formulaire-produit" method="post" action="ajouter_produit.php" class="formulaire" enctype="multipart/form-data">

            <!-- Image -->
            <div class="section-image">
                <div class="section-titre">
                    <span class="titre-icone"><i class="fas fa-camera"></i></span>
                    Image de l'article
                </div>
                <div class="conteneur-image">
                    <div class="apercu-wrap" id="apercu-wrap">
                        <div class="apercu-placeholder">
                            <i class="fas fa-image"></i>
                            <span>Aperçu</span>
                        </div>
                    </div>
                    <div class="zone-upload" id="zone-upload">
                        <input type="file" id="fichier-image" name="logo" accept="image/*" required>
                        <div class="upload-icone"><i class="fas fa-cloud-arrow-up"></i></div>
                        <p class="upload-texte"><strong>Cliquez ici</strong> ou glissez votre image</p>
                        <p class="upload-meta">PNG, JPG, WebP — max 5 Mo</p>
                    </div>
                </div>
            </div>

            <!-- Infos produit -->
            <div class="sep">
                <div class="sep-ligne"></div>
                <span class="sep-label"><i class="fas fa-tag"></i>&nbsp; Informations produit</span>
                <div class="sep-ligne"></div>
            </div>

            <div class="grille grille-2">
                <div class="champ">
                    <label class="champ-label" for="nom-article">
                        <i class="fas fa-box"></i> Nom de l'article <span class="requis">*</span>
                    </label>
                    <input type="text" id="nom-article" name="nom" class="champ-input"
                        placeholder="Ex : Sac à main en cuir" required minlength="3" maxlength="200">
                </div>
                <div class="champ">
                    <label class="champ-label" for="prix-article">
                        <i class="fas fa-coins"></i> Prix (FCFA) <span class="requis">*</span>
                    </label>
                    <input type="number" id="prix-article" name="prix" class="champ-input"
                        placeholder="Ex : 15000" required min="1">
                </div>
            </div>

            <div class="grille grille-1">
                <div class="champ">
                    <label class="champ-label" for="description-article">
                        <i class="fas fa-align-left"></i> Description <span class="requis">*</span>
                    </label>
                    <textarea id="description-article" name="description" class="champ-textarea"
                        placeholder="Qualité, état, matière, dimensions, couleurs disponibles..."
                        required minlength="10" maxlength="2000"></textarea>
                </div>
            </div>

            <!-- Localisation & Contact -->
            <div class="sep" style="margin-top:0.25rem;">
                <div class="sep-ligne"></div>
                <span class="sep-label"><i class="fas fa-location-dot"></i>&nbsp; Localisation &amp; contact</span>
                <div class="sep-ligne"></div>
            </div>

            <div class="grille grille-2">
                <div class="champ">
                    <label class="champ-label" for="localisation">
                        <i class="fas fa-map-marker-alt"></i> Localisation <span class="requis">*</span>
                    </label>
                    <input type="text" id="localisation" name="localisation" class="champ-input"
                        placeholder="Ex : Douala, Akwa" required>
                </div>
                <div class="champ">
                    <label class="champ-label" for="whatsapp">
                        <i class="fab fa-whatsapp"></i> WhatsApp <span class="requis">*</span>
                    </label>
                    <input type="tel" id="whatsapp" name="whatsapp" class="champ-input"
                        placeholder="+237 6XX XX XX XX" required>
                </div>
            </div>

            <!-- Messages -->
            <div id="zone-messages"></div>

            <!-- Bouton -->
            <div class="bouton-wrap">
                <button type="submit" class="bouton" id="bouton-soumettre">
                    <i class="fas fa-plus"></i> Ajouter le produit
                </button>
            </div>
        </form>

        <div class="pied">
            En publiant, vous acceptez nos <a href="condition.html">conditions d'utilisation</a>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="src/js/formulaire_article.js">
</script>
</body>
</html>
