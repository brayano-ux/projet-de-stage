<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat Client</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
    #chatbox { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    .msg-user { text-align: right; color: #007bff; margin: 8px 0; }
    .msg-bot  { text-align: left;  color: #333;    margin: 8px 0; }
    #inputArea { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>💬 Support Client</h2>
  <div id="chatbox"></div>
  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Écrivez votre message..." />
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <script>
    // Historique de la conversation
    let history = [];

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg) return;

      appendMessage('user', msg);
      history.push({ role: 'user', content: msg });
      input.value = '';

      // Appel au backend PHP
      const response = await fetch('chat.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await response.json();
      const reply = data.reply || "Erreur de réponse.";
      
      appendMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
    }

    function appendMessage(role, text) {
      const chatbox = document.getElementById('chatbox');
      const div = document.createElement('div');
      div.className = role === 'user' ? 'msg-user' : 'msg-bot';
      div.innerHTML = `<b>${role === 'user' ? 'Vous' : '🤖 Assistant'} :</b> ${text}`;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    // Envoyer avec la touche Entrée
    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
